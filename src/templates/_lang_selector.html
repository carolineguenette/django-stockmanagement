{% load i18n %}
{% load static %}

<nav class="lang-selector">
    <!-- Le composant details gère nativement l'ouverture/fermeture au clic -->
    <details class="lang-dropdown-details">
        <summary class="lang-dropdown-summary" title="{% translate 'Change language' %}">
            <img src="{% static 'img/international.svg' %}" alt="" class="global-icon">
            {% get_current_language as CURRENT_LANG %}
            <span class="current-lang-text">{{ CURRENT_LANG|upper }}</span>
            <span class="dropdown-arrow">
                <img src="{% static 'img/arrow-down-gray.svg' %}" alt="▼">
            </span>
        </summary>

        <ul class="lang-dropdown-list">
            {% get_available_languages as AVAILABLE_LANGS %}
            {% for lang in AVAILABLE_LANGS %}
                <li>
                    {% language lang.0 %}
                        <!-- On utilise la balise de routage dynamique vers la page d'accueil de la langue -->
                        <a href="{% url 'home' %}" class="lang-dropdown-link {% if lang.0 == CURRENT_LANG %}active{% endif %}">
                            <span class="lang-code-label">{{ lang.0|upper }}</span>
                            <span class="lang-name-label">{{ lang.1 }}</span>
                        </a>
                    {% endlanguage %}
                </li>
            {% endfor %}
        </ul>
    </details>
</nav>
