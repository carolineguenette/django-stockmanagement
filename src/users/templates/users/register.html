{% extends 'main.html' %}
{% load i18n %}
{% load static %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        
        <!-- Icône centrale au-dessus du titre -->
        <div class="auth-icon-center">
            <img src="{% static 'img/register.svg' %}" alt="">
        </div>

        <h2>{% translate "Create a new account" %}</h2>
        <p class="auth-subtitle">{% translate "Enter your details to register." %}</p>

        <form method="post" class="auth-form">
            {% csrf_token %}

            <!-- Champ Nom d'utilisateur -->
            <div class="input-group">
                <div class="input-icon-wrapper">
                    <img src="{% static 'img/person.svg' %}" alt="" class="field-icon">
                    <input type="text" name="username" placeholder="{% translate 'Username' %}" required>
                </div>
            </div>

            <!-- Champ Courriel -->
            <div class="input-group">
                <div class="input-icon-wrapper">
                    <img src="{% static 'img/email.svg' %}" alt="" class="field-icon">
                    <input type="email" name="email" placeholder="{% translate 'Email' %}" required>
                </div>
            </div>

            <!-- Champ Mot de passe -->
            <div class="input-group">
                <div class="input-icon-wrapper">
                    <img src="{% static 'img/keys.svg' %}" alt="" class="field-icon">
                    <input type="password" name="password" placeholder="{% translate 'Password' %}" required>
                </div>
            </div>

            <!-- Indicateur graphique temporaire exigé par la capture -->
            <div class="password-strength-meter">
                <span class="meter-text">{% translate "Password Strength" %}</span>
                <div class="meter-bar"><div class="bar-fill"></div></div>
            </div>

            <button type="submit" class="btn-primary">{% translate "Sign Up" %}</button>
        </form>
    </div>
</div>
{% endblock %}
